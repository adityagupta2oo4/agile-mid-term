apiVersion: apps/v1
kind: Deployment
metadata:
  name: agile-conference-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: conference
  template:
    metadata:
      labels:
        app: conference
    spec:
      containers:
      - name: web-container
        image: your-docker-hub-id/html-demo:latest # <--- UPDATE THIS
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: conference-service
spec:
  type: NodePort
  selector:
    app: conference
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007