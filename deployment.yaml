apiVersion: apps/v1
kind: Deployment
metadata:
  name: agile-conference-deployment
spec:
  replicas: 2 # Runs two copies of your web page for reliability
  selector:
    matchLabels:
      app: conference-web
  template:
    metadata:
      labels:
        app: conference-web
    spec:
      containers:
      - name: conference-container
        # Replace 'yourdockerid' with your actual Docker Hub username
        image: aditya2oo4/html-demo:latest 
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: conference-service
spec:
  type: NodePort
  selector:
    app: conference-web
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007 # Access the site at localhost:30007